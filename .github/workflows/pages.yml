name: Deploy bakery site to GitHub Pages

# Publishes bakery-site/ to GitHub Pages. Runs after the site lands on main
# (i.e. once this PR is merged), and can be run manually from the Actions tab.
on:
  push:
    branches: [main]
    paths:
      - "bakery-site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Permissions the deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # enablement: true turns Pages on automatically the first time this runs.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: bakery-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
